<html>

        body { background-color: #FFFFE0; color: #000000; font-family: "MS Mincho", "바탕"; line-height: 1.6; padding: 20px; }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
        .update-table { background-color: #FFFFFF; border: 1px solid #000080; border-collapse: collapse; }
        .update-table td { border: 1px solid #000080; padding: 5px; }
    </style>
</head>

        <br>

</html>
