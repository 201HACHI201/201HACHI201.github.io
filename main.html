<html>
<head>
    <meta charset="UTF-8">
    <title>장희진의 드림 메인</title>
    <style>
        body {
            /* 자체적으로 노란색 줄무늬 패턴을 만들어내는 코드 */
            background: repeating-linear-gradient( 0deg, #FFFFE0, #FFFFE0 15px, #FFFACD 15px, #FFFACD 30px );
            color: #555555;
            font-family: "MS Mincho", "바탕", serif;
            margin: 0; padding: 0;
        }
        .main-box {
            background-color: #FFFFFF;
            border: 3px dashed #FFA500; /* 귀여운 오렌지색 점선 테두리 */
            width: 90%;
            margin: 20px auto;
            padding: 15px;
            text-align: center;
        }
        .title {
            background-color: #FFA500;
            color: #FFFFFF;
            font-weight: bold;
            padding: 8px;
            display: inline-block;
            margin-bottom: 15px;
            border: 2px solid #CC8400;
            font-size: 11pt;
        }
        .marquee-box {
            background-color: #FFE4E1;
            border: 2px solid #FF69B4;
            padding: 5px;
            color: #FF1493;
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 9pt;
        }
        
        /* ★ 고양이 키우기 게임 스타일 ★ */
        .cat-game-box {
            background-color: #F0F8FF; /* 옅은 하늘색 배경 */
            border: 2px solid #4682B4; /* 푸른색 테두리 */
            padding: 10px;
            margin: 15px auto;
            width: 250px; /* 고정 크기 */
            font-family: "MS Gothic", "돋움", sans-serif;
            font-size: 9pt;
        }
        .cat-display {
            background-color: #FFFFFF;
            border: 1px solid #000000;
            font-size: 25pt; /* 픽셀 아트/이모지 크기 */
            margin: 10px 0;
            padding: 10px;
            height: 50px;
            line-height: 50px;
        }
        .status-bar {
            color: #000080;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .game-btn {
            background-color: #B0C4DE;
            border: 1px solid #4682B4;
            color: #000000;
            font-family: "MS Gothic", "돋움", sans-serif;
            font-size: 9pt;
            cursor: pointer;
            padding: 3px 8px;
            margin: 0 2px;
        }
        .game-btn:hover { background-color: #4682B4; color: #FFFFFF; }

        .log-table {
            width: 100%;
            border: 2px solid #FFA500;
            border-collapse: collapse;
            background-color: #FFF8DC;
            margin-top: 15px;
        }
        .log-table th { background-color: #FFD700; border: 1px solid #FFA500; padding: 5px; color: #8B4513; font-size: 10pt; }
        .log-table td { border: 1px solid #FFA500; padding: 5px; text-align: left; font-size: 9pt; }
    </style>
</head>
<body>
    <div class="main-box">
        <div class="title">(*≧ω≦) 환영합니다! 장희진의 드림 홈페이지!</div>
        
        <div class="marquee-box">
            <marquee scrollamount="4">★ 신규 드림 연성 "비 오는 날의 조우" 업로드 완료! 방명록 꼭 남겨주세요! ★</marquee>
        </div>
        
        <table border="4" bordercolor="#FFB6C1" cellpadding="0" cellspacing="0" align="center">
            <tr><td>
                <img src="main_pic.png" alt="[메인 이미지 자리]" width="280" height="180">
            </td></tr>
        </table>
        
        <br>
        <hr color="#FFA500" size="1" dotted>
        
        <div class="cat-game-box">
            <div style="font-weight:bold; color:#FFFFFF; background-color:#4682B4; padding:3px; border:1px solid #000000; margin-bottom:5px;">
                ■ NYANKO PET (v1.0) ■
            </div>
            <div class="status-bar">
                포만감: <span id="hunger-level">50</span> | 행복도: <span id="happy-level">50</span>
            </div>
            <div class="cat-display" id="cat-visual">
                ^._.^
            </div>
            <div style="margin-top:5px;">
                <button class="game-btn" onclick="feedCat()">[밥주기]</button>
                <button class="game-btn" onclick="playCat()">[놀아주기]</button>
            </div>
            <div id="game-message" style="color:red; margin-top:5px; font-weight:bold; height:15px;"></div>
        </div>
        
        <script>
            // 고전적인 자바스크립트 게임 코드
            var hunger = 50;
            var happy = 50;
            var maxVal = 100;
            var minVal = 0;
            var msgTimer;

            // 화면 업데이트 함수
            function updateDisplay() {
                document.getElementById('hunger-level').innerText = hunger;
                document.getElementById('happy-level').innerText = happy;

                var visual = document.getElementById('cat-visual');
                var msg = document.getElementById('game-message');

                if (hunger >= 90) {
                    visual.innerText = "X_X"; // 배고파 주금
                    msg.innerText = "배가 고파서 쓰러졌습니다! 밥을 주세요!";
                } else if (happy <= 10) {
                    visual.innerText = "T_T"; // 너무 슬픔
                    msg.innerText = "너무 외로워요... 놀아주세요!";
                } else if (hunger <= 20 && happy >= 80) {
                    visual.innerText = "(*^ω^*)"; // 최고 상태
                    msg.innerText = "최고로 행복해 냥!";
                } else if (hunger <= 30) {
                    visual.innerText = "(^･∀･)"; // 배부름
                    msg.innerText = "배가 불러요!";
                } else {
                    visual.innerText = "^._.^"; // 보통
                    msg.innerText = "";
                }
            }

            // 메세지 표시 함수
            function showMessage(text) {
                var msg = document.getElementById('game-message');
                msg.innerText = text;
                clearTimeout(msgTimer);
                msgTimer = setTimeout(function() {
                    updateDisplay(); // 2초 뒤 상태 메세지로 복구
                }, 2000);
            }

            // 밥주기 함수
            function feedCat() {
                if (hunger >= 90) { // 쓰러졌을 땐 밥 많이
                    hunger -= 30;
                } else {
                    hunger -= 10;
                }
                
                if (hunger < minVal) hunger = minVal;
                updateDisplay();
                showMessage("(=^･ω･^=) 냠냠! 맛있다 냥!");
            }

            // 놀아주기 함수
            function playCat() {
                happy += 15;
                hunger += 5; // 놀면 배고파짐
                
                if (happy > maxVal) happy = maxVal;
                if (hunger > maxVal) hunger = maxVal;
                
                updateDisplay();
                showMessage("(≥▽≤)ノ 꺄핫! 신난다 냥!");
            }

            // 시간이 지남에 따라 상태 악화 (10초마다)
            setInterval(function() {
                hunger += 2; // 배고파짐
                happy -= 1; // 외로워짐
                
                if (hunger > maxVal) hunger = maxVal;
                if (happy < minVal) happy = minVal;
                
                updateDisplay();
            }, 10000);

            // 초기 실행
            updateDisplay();
        </script>
        
        <table class="log-table">
            <tr><th>업데이트 로그 (Update Log)</th></tr>
            <tr><td>
                - 2026/04/13: 고양이 키우기 게임 탑재!<br>
                - 2026/04/13: 홈페이지 가개장 및 프로필 업데이트
            </td></tr>
        </table>
    </div>
</body>
</html>
